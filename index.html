<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diego Romero - Proyecto Hábitos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main id="home-screen" class="hero-container">
        <section class="content">
            <h1 id="glitch-title" class="glitch-target">Diego</h1>
            <p class="subtitle glitch-target">Médico. Mi objetivo es transformar la salud mediante la mejora consciente de los hábitos diarios.</p>
            <button id="startBtn" class="typewriter-btn">Comencemos</button>
        </section>
    </main>

    <div id="transition-overlay">
        <div class="expanding-circle"></div>
        <div id="final-text-container">
            <h2 id="question-text">¿para qué?</h2>
        </div>
    </div>

    <div id="scroll-screen">
        <div class="tiktok-ui">
            <div class="side-icons">
                <div class="icon heart-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                    <span>1.2M</span>
                </div>
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                    </svg>
                    <span>456K</span>
                </div>
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="18" cy="5" r="3"></circle>
                        <circle cx="6" cy="12" r="3"></circle>
                        <circle cx="18" cy="19" r="3"></circle>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                    </svg>
                    <span>Share</span>
                </div>
            </div>

            <div class="bottom-info">
                <p class="username">@dr.diego.habitos</p>
                <p class="caption">Explorando el potencial humano...</p>
            </div>

            <div class="progress-bar-container">
                <div id="progress-fill"></div>
            </div>
        </div>
        
        <div id="scroll-container"></div>
    </div>

    <div id="reflection-screen">
        <div class="reflection-container">
            <p id="reflection-output" class="reflection-text"></p>
            <button id="readyBtn" class="typewriter-btn">Estoy listo</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
